name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --exclude counter-methods --exclude counter-methods-guest
      - name: Check formatting
        run: cargo fmt --all -- --check
        env:
          RISC0_SKIP_BUILD: "1"
      - name: Clippy
        run: cargo clippy --workspace --exclude counter-methods --exclude counter-methods-guest -- -D warnings
